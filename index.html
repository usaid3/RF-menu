<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Royal Feast — A Royal Banquet Awaits Thee. Digital Menu & Online Ordering.">
  <meta name="theme-color" content="#722f37">
  <title>👑 Royal Feast — شاہی دستر خوان</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=IM+Fell+English:ital@0;1&family=MedievalSharp&family=Pirata+One&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════════
       🏰 CSS VARIABLES — ROYAL THEME COLORS & FONTS
    ═══════════════════════════════════════════════════ */
    :root {
      --burgundy: #722f37;
      --burgundy-dark: #5a1f27;
      --burgundy-light: #8c3a44;
      --gold: #b8860b;
      --gold-light: #d4a843;
      --gold-glow: #daa52080;
      --parchment: #f4e8c1;
      --parchment-dark: #e8d5a3;
      --parchment-light: #faf3e0;
      --stone: #5d5d5d;
      --stone-dark: #3a3a3a;
      --stone-light: #8a8a7a;
      --forest: #2d4a2b;
      --forest-light: #3d6a3b;
      --iron: #2c2416;
      --iron-light: #4a3c2a;
      --cream: #fefcf3;
      --ember: #e25822;
      --ember-glow: #ff6b3520;
      --flame-orange: #ff9500;
      --flame-red: #e63946;
      --flame-yellow: #ffd700;
      --shadow-dark: rgba(44, 36, 22, 0.5);
      --shadow-medium: rgba(44, 36, 22, 0.3);
      --shadow-light: rgba(44, 36, 22, 0.15);

      /* Fonts */
      --font-royal: 'Cinzel Decorative', serif;
      --font-heading: 'Cinzel', serif;
      --font-body: 'IM Fell English', serif;
      --font-medieval: 'MedievalSharp', cursive;
      --font-pirate: 'Pirata One', cursive;

      /* Spacing */
      --section-padding: clamp(2rem, 5vw, 4rem);
      --card-radius: 12px;
      --transition-smooth: all 0.3s ease;
    }

    /* ═══════════════════════════════════════════════════
       ⚔️ CSS RESET & BASE STYLES
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 80px;
      font-size: 16px;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--iron);
      color: var(--parchment);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Scrollbar Royal Styling */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: var(--iron);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--burgundy);
      border-radius: 10px;
      border: 2px solid var(--iron);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--gold);
    }

    /* Selection Color */
    ::selection {
      background: var(--gold);
      color: var(--iron);
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      outline: none;
      font-family: var(--font-medieval);
    }

    ul, ol {
      list-style: none;
    }

    /* ═══════════════════════════════════════════════════
       🔥 TORCH FLAME ANIMATIONS
    ═══════════════════════════════════════════════════ */
    @keyframes flicker {
      0%, 100% { opacity: 1; transform: scale(1) rotate(-1deg); }
      10% { opacity: 0.85; transform: scale(1.02) rotate(1deg); }
      20% { opacity: 0.95; transform: scale(0.98) rotate(-2deg); }
      30% { opacity: 0.9; transform: scale(1.03) rotate(1.5deg); }
      40% { opacity: 1; transform: scale(1) rotate(-1deg); }
      50% { opacity: 0.88; transform: scale(1.01) rotate(2deg); }
      60% { opacity: 0.96; transform: scale(0.99) rotate(-1.5deg); }
      70% { opacity: 0.92; transform: scale(1.02) rotate(1deg); }
      80% { opacity: 1; transform: scale(1) rotate(-0.5deg); }
      90% { opacity: 0.87; transform: scale(1.01) rotate(1.5deg); }
    }

    @keyframes torchGlow {
      0%, 100% {
        box-shadow: 0 0 20px 10px rgba(255, 149, 0, 0.4),
                    0 0 40px 20px rgba(255, 107, 53, 0.2),
                    0 0 60px 30px rgba(230, 57, 70, 0.1);
      }
      50% {
        box-shadow: 0 0 25px 15px rgba(255, 149, 0, 0.5),
                    0 0 50px 25px rgba(255, 107, 53, 0.3),
                    0 0 70px 35px rgba(230, 57, 70, 0.15);
      }
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 0.8; }
      50% { opacity: 1; }
      100% { transform: translateY(-60px) scale(0.5); opacity: 0; }
    }

    @keyframes crownBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-5px) rotate(-5deg); }
      75% { transform: translateY(-3px) rotate(5deg); }
    }

    @keyframes pulseGold {
      0%, 100% { box-shadow: 0 0 5px var(--gold-glow); }
      50% { box-shadow: 0 0 20px var(--gold-glow), 0 0 40px rgba(184, 134, 11, 0.1); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scrollUnroll {
      from { opacity: 0; transform: scaleY(0.3); transform-origin: top; }
      to { opacity: 1; transform: scaleY(1); transform-origin: top; }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes bannerWave {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }

    @keyframes candleFlicker {
      0%, 100% { opacity: 0.7; filter: brightness(1); }
      25% { opacity: 0.9; filter: brightness(1.1); }
      50% { opacity: 0.75; filter: brightness(0.95); }
      75% { opacity: 1; filter: brightness(1.05); }
    }

    @keyframes cartBounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.3); }
      60% { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    @keyframes toastSlide {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes toastSlideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(120%); opacity: 0; }
    }

    /* Reduced Motion Support */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }

    /* ═══════════════════════════════════════════════════
       🏰 HERO SECTION — CASTLE GATE
    ═══════════════════════════════════════════════════ */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1rem;
      background:
        radial-gradient(ellipse at center top, rgba(184, 134, 11, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at center bottom, rgba(114, 47, 55, 0.3) 0%, transparent 60%),
        linear-gradient(180deg, #1a0f08 0%, #2c2416 30%, #3a2a1a 60%, #2c2416 100%);
      overflow: hidden;
    }

    /* Stone Wall Texture Overlay */
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(90, 80, 60, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(90, 80, 60, 0.08) 0%, transparent 50%),
        repeating-conic-gradient(rgba(60, 50, 30, 0.03) 0% 25%, transparent 0% 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Dark Vignette Effect */
    .hero::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    /* ═══ TORCH CONTAINERS ═══ */
    .torch-container {
      position: absolute;
      top: 15%;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .torch-left { left: 5%; }
    .torch-right { right: 5%; }

    .torch-handle {
      width: 12px;
      height: 80px;
      background: linear-gradient(180deg, #8B6914, #5a4510, #3a2a0a);
      border-radius: 3px;
      position: relative;
    }

    .torch-handle::before {
      content: '';
      position: absolute;
      top: -5px;
      left: -6px;
      width: 24px;
      height: 14px;
      background: linear-gradient(180deg, #a0892a, #6b5a1e);
      border-radius: 4px 4px 0 0;
    }

    .flame-wrapper {
      position: relative;
      width: 50px;
      height: 70px;
      margin-bottom: -8px;
    }

    .flame {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 50px;
      background: linear-gradient(0deg,
        #ff4500 0%,
        #ff6500 20%,
        #ff9500 40%,
        #ffb700 60%,
        #ffd700 80%,
        #fff4b0 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: flicker 2s infinite ease-in-out;
      filter: blur(1px);
    }

    .flame::before {
      content: '';
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 32px;
      background: linear-gradient(0deg,
        #fff4b0,
        #ffe680,
        #ffd700);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: flicker 1.5s infinite ease-in-out 0.3s;
    }

    .flame::after {
      content: '';
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 18px;
      background: #fffef0;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: flicker 1s infinite ease-in-out 0.5s;
    }

    .flame-glow {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, rgba(255, 149, 0, 0.3), transparent);
      border-radius: 50%;
      animation: torchGlow 3s infinite ease-in-out;
      pointer-events: none;
    }

    /* ═══ ROYAL CREST ═══ */
    .royal-crest {
      margin-bottom: 1.5rem;
      font-size: clamp(3rem, 8vw, 5rem);
      animation: crownBounce 4s infinite ease-in-out;
      filter: drop-shadow(0 0 20px rgba(184, 134, 11, 0.5));
    }

    /* ═══ RESTAURANT NAME ═══ */
    .hero-title {
      font-family: var(--font-royal);
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 900;
      color: var(--gold-light);
      text-shadow:
        0 0 10px rgba(184, 134, 11, 0.5),
        0 0 30px rgba(184, 134, 11, 0.3),
        0 2px 4px rgba(0, 0, 0, 0.8);
      letter-spacing: 3px;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .hero-title-urdu {
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      color: var(--gold);
      margin-bottom: 1rem;
      font-weight: 600;
      direction: rtl;
      text-shadow: 0 0 15px rgba(184, 134, 11, 0.4);
      font-family: 'Amiri', var(--font-heading), serif;
    }

    /* ═══ BANNER RIBBON ═══ */
    .hero-banner {
      position: relative;
      display: inline-block;
      padding: 0.8rem 3rem;
      margin: 1.5rem 0;
      background: linear-gradient(135deg, var(--burgundy) 0%, var(--burgundy-dark) 100%);
      color: var(--parchment);
      font-family: var(--font-medieval);
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: bannerWave 6s infinite ease-in-out;
      box-shadow: 0 4px 15px var(--shadow-dark);
    }

    .hero-banner::before,
    .hero-banner::after {
      content: '';
      position: absolute;
      top: 0;
      width: 30px;
      height: 100%;
      background: linear-gradient(135deg, var(--burgundy-dark) 0%, var(--burgundy) 100%);
    }

    .hero-banner::before {
      left: -20px;
      clip-path: polygon(100% 0, 100% 100%, 0 50%);
    }

    .hero-banner::after {
      right: -20px;
      clip-path: polygon(0 0, 100% 50%, 0 100%);
    }

    /* ═══ HERO DETAILS ═══ */
    .hero-details {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 1.5rem;
      animation: fadeInUp 1s ease 0.5s both;
    }

    .hero-detail-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-medieval);
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--parchment-dark);
      padding: 0.5rem 1rem;
      background: rgba(44, 36, 22, 0.6);
      border: 1px solid rgba(184, 134, 11, 0.3);
      border-radius: 8px;
      backdrop-filter: blur(5px);
    }

    .hero-detail-item span.icon {
      font-size: 1.2rem;
    }

    /* ═══ SCROLL DOWN INDICATOR ═══ */
    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--gold);
      font-family: var(--font-medieval);
      font-size: 0.85rem;
      letter-spacing: 2px;
      animation: fadeInUp 1s ease 1s both;
      cursor: pointer;
    }

    .scroll-indicator .arrow {
      font-size: 1.5rem;
      animation: floatUp 2s infinite ease-in-out reverse;
    }

    /* ═══════════════════════════════════════════════════
       🏰 CATEGORY NAVIGATION — CASTLE BATTLEMENTS
    ═══════════════════════════════════════════════════ */
    .category-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(180deg, #1a0f08 0%, #2c2416 100%);
      border-bottom: 3px solid var(--gold);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      padding: 0;
    }

    .category-nav-inner {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 0;
      padding: 0 0.5rem;
    }

    .category-nav-inner::-webkit-scrollbar {
      display: none;
    }

    .category-nav-btn {
      flex: 0 0 auto;
      scroll-snap-align: start;
      padding: 0.9rem 1.2rem;
      font-family: var(--font-medieval);
      font-size: clamp(0.75rem, 1.8vw, 0.9rem);
      color: var(--parchment-dark);
      background: transparent;
      border: none;
      white-space: nowrap;
      transition: var(--transition-smooth);
      position: relative;
      letter-spacing: 0.5px;
    }

    .category-nav-btn:hover {
      color: var(--gold-light);
      background: rgba(184, 134, 11, 0.1);
    }

    .category-nav-btn.active {
      color: var(--gold-light);
      font-weight: 700;
    }

    .category-nav-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      width: 60%;
      height: 3px;
      background: var(--gold);
      border-radius: 3px 3px 0 0;
      box-shadow: 0 0 10px var(--gold-glow);
    }

    /* ═══════════════════════════════════════════════════
       📜 MENU SECTIONS — ROYAL PROCLAMATIONS
    ═══════════════════════════════════════════════════ */
    .menu-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .menu-section {
      padding: var(--section-padding) 0;
      position: relative;
    }

    /* ═══ CATEGORY HEADER — BANNER RIBBON ═══ */
    .category-header {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
    }

    .category-header .swords-top {
      font-size: 1.5rem;
      color: var(--gold);
      margin-bottom: 0.5rem;
      display: block;
      letter-spacing: 8px;
    }

    .category-title {
      font-family: var(--font-royal);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: var(--gold-light);
      text-shadow: 0 0 10px rgba(184, 134, 11, 0.3), 0 2px 4px rgba(0, 0, 0, 0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
      position: relative;
      display: inline-block;
      padding: 0 1.5rem;
    }

    .category-title::before,
    .category-title::after {
      content: '⚔';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: var(--gold);
    }

    .category-title::before { left: -0.5rem; transform: translateY(-50%) scaleX(-1); }
    .category-title::after { right: -0.5rem; }

    .category-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 0.8rem;
    }

    .category-divider .line {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .category-divider .ornament {
      color: var(--gold);
      font-size: 1rem;
    }

    /* ═══════════════════════════════════════════════════
       🛡️ MENU CARDS — PARCHMENT SCROLL STYLE
    ═══════════════════════════════════════════════════ */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }

    .menu-card {
      background:
        linear-gradient(145deg, #f4e8c1 0%, #e8d5a3 30%, #f0e0b5 60%, #e5d09a 100%);
      border-radius: var(--card-radius);
      border: 2px solid var(--gold);
      position: relative;
      overflow: hidden;
      transition: var(--transition-smooth);
      animation: fadeInUp 0.6s ease both;
      box-shadow:
        0 4px 15px var(--shadow-medium),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    /* Parchment Texture Overlay */
    .menu-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(139, 105, 20, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(139, 105, 20, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .menu-card:hover {
      transform: translateY(-8px);
      box-shadow:
        0 12px 35px var(--shadow-dark),
        0 0 20px var(--gold-glow),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      border-color: var(--gold-light);
    }

    /* ═══ WAX SEAL on special items ═══ */
    .menu-card.special::after {
      content: '👑';
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      background: radial-gradient(circle, var(--burgundy), var(--burgundy-dark));
      border-radius: 50%;
      box-shadow: 0 2px 10px rgba(114, 47, 55, 0.5);
      z-index: 2;
      animation: crownBounce 4s infinite ease-in-out;
    }

    .menu-card-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ═══ ITEM IMAGE ═══ */
    .menu-card-img-wrapper {
      width: 100%;
      height: 200px;
      overflow: hidden;
      position: relative;
      border-bottom: 3px solid var(--gold);
    }

    .menu-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .menu-card:hover .menu-card-img {
      transform: scale(1.08);
    }

    .menu-card-img-wrapper::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to top, rgba(244, 232, 193, 0.8), transparent);
      pointer-events: none;
    }

    /* ═══ CARD CONTENT ═══ */
    .menu-card-content {
      padding: 1.2rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .menu-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.8rem;
      gap: 0.5rem;
    }

    .menu-card-name {
      font-family: var(--font-heading);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 700;
      color: var(--iron);
      line-height: 1.3;
    }

    .menu-card-price {
      font-family: var(--font-heading);
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      font-weight: 700;
      color: var(--burgundy);
      white-space: nowrap;
      display: flex;
      align-items: center;
